var useState=React.useState,useRef=React.useRef,useEffect=React.useEffect,useCallback=React.useCallback;

/* === Firebase sync hook === */
function useFirebaseState(path, defaultVal) {
  var s = useState(defaultVal);
  var val = s[0], setVal = s[1];
  var fromFB = useRef(false);
  var ref = useRef(db.ref(path));
  var initialized = useRef(false);

  useEffect(function() {
    var r = db.ref(path);
    ref.current = r;
    r.on("value", function(snap) {
      var data = snap.val();
      fromFB.current = true;
      if (data !== null) {
        setVal(data);
      } else if (!initialized.current) {
        // First time, no data in Firebase — push defaults
        r.set(defaultVal);
      }
      initialized.current = true;
    });
    return function() { r.off(); };
  }, [path]);

  var setter = useCallback(function(newValOrFn) {
    setVal(function(prev) {
      var next = typeof newValOrFn === "function" ? newValOrFn(prev) : newValOrFn;
      // Write to Firebase
      ref.current.set(next);
      return next;
    });
  }, []);

  return [val, setter];
}

function useWindowWidth(){
  var s=useState(window.innerWidth);
  useEffect(function(){function h(){s[1](window.innerWidth);}window.addEventListener("resize",h);return function(){window.removeEventListener("resize",h);};},[]);
  return s[0];
}

function polar(cx,cy,r,deg){var a=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
function arcPath(cx,cy,r,s,e){var a=polar(cx,cy,r,s),b=polar(cx,cy,r,e),sw=e-s;if(sw<0)sw+=360;return"M "+a.x+" "+a.y+" A "+r+" "+r+" 0 "+(sw>180?1:0)+" 1 "+b.x+" "+b.y;}
function t2a(h,m){return((h*60+m)/1440)*360;}
function pTime(s){var p=s.split(":");return{h:parseInt(p[0])||0,m:parseInt(p[1])||0};}
function pad2(v){return String(v).padStart(2,"0");}
function fmtD(min){var h=Math.floor(min/60),m=min%60;if(h>0)return h+"ч"+(m>0?" "+m+"м":"");return m+"м";}
function tMin(t){var s=t.startH*60+t.startM,e=t.endH*60+t.endM;if(e<=s)e+=1440;return e-s;}
function inTask(t,nh,nm){var n=nh*60+nm,s=t.startH*60+t.startM,e=t.endH*60+t.endM;if(e<=s)return n>=s||n<e;return n>=s&&n<e;}
function daysLeft(d){if(!d)return null;var t=new Date(d),n=new Date();n.setHours(0,0,0,0);t.setHours(0,0,0,0);return Math.ceil((t-n)/864e5);}

  var ns1=useState(new Date()),now=ns1[0],setNow=ns1[1];

  var countdown="--:--:--";

    var eM=curTask.endH*60+curTask.endM,nM=nh*60+nm,sM=curTask.startH*60+curTask.startM;
    if(eM<=sM&&nM>=sM)eM+=1440;if(eM<=nM)eM+=1440;
    var df=(eM-nM)*60-nss;if(df<0)df=0;

  }

  function addTask(){if(!newName.trim())return;var s=pTime(newStart),e=pTime(newEnd);

  var dragI=useRef(null),dragO=useRef(null);
  function dEnd(){if(dragI.current===null||dragO.current===null)return;var c=safeTasks.slice(),d=c.splice(dragI.current,1)[0];c.splice(dragO.current,0,d);setTasks(c);dragI.current=null;dragO.current=null;}

  var totalUsed=0;for(var ti=0;ti<safeTasks.length;ti++)totalUsed+=tMin(safeTasks[ti]);
  var totalFree=Math.max(0,1440-totalUsed);

  var cx=200,cy=200,R=155,rI=95;

      {curTask?(<div><div style={{fontSize:9,color:"#7D8590",letterSpacing:2,textTransform:"uppercase"}}>Сейчас</div>
        <div style={{fontSize:mob?16:20,fontWeight:700,marginTop:4,color:curTask.color}}>{curTask.name}</div>
        <div style={{fontSize:11,color:"#7D8590",marginTop:2}}>{pad2(curTask.startH)}:{pad2(curTask.startM)} — {pad2(curTask.endH)}:{pad2(curTask.endM)}</div></div>
      ):(<div style={{fontSize:12,color:"#484F58",paddingTop:8}}>Нет активной задачи</div>)}
    </div>
    <div style={{flex:1,textAlign:"center",padding:mob?"10px":"14px 16px",background:curTask?"#1C2333":"#161B22",borderRadius:8,border:curTask?"1px solid "+curTask.color+"30":"1px solid #21262D"}}>
      <div style={{fontSize:9,color:"#7D8590",letterSpacing:2,textTransform:"uppercase"}}>Осталось</div>
      <div style={{fontSize:mob?24:30,fontWeight:700,marginTop:4,color:curTask?"#FF6B6B":"#484F58",fontVariantNumeric:"tabular-nums",letterSpacing:2}}>{countdown}</div>
      {curTask&&<div style={{fontSize:10,color:"#484F58",marginTop:2}}>до конца задачи</div>}
    </div>
  </div>);

  var addForm=(<div style={{background:"#161B22",borderRadius:10,padding:"12px 14px",border:"1px solid #21262D"}}>
    <div style={{fontSize:10,color:"#7D8590",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>Добавить в режим дня</div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div><div style={{fontSize:9,color:"#484F58",marginBottom:3}}>Название</div>
        <input value={newName} onChange={function(e){setNewName(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")addTask();}}
          placeholder="Задача" style={Object.assign({},inp,{width:"100%",boxSizing:"border-box"})}/></div>
      <div style={{display:"flex",gap:6}}>
        <div style={{flex:1}}><div style={{fontSize:9,color:"#484F58",marginBottom:3}}>С</div>
          <input type="time" value={newStart} onChange={function(e){setNewStart(e.target.value);}} style={Object.assign({},inp,{width:"100%",boxSizing:"border-box"})}/></div>
        <div style={{flex:1}}><div style={{fontSize:9,color:"#484F58",marginBottom:3}}>До</div>
          <input type="time" value={newEnd} onChange={function(e){setNewEnd(e.target.value);}} style={Object.assign({},inp,{width:"100%",boxSizing:"border-box"})}/></div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <div style={{position:"relative"}}><div style={{fontSize:9,color:"#484F58",marginBottom:3}}>Цвет</div>
          <div onClick={function(){setShowNewColor(!showNewColor);}} style={{width:36,height:36,borderRadius:6,background:newColor,cursor:"pointer",border:"2px solid #30363D"}}/>
          {showNewColor&&<div style={{position:"absolute",bottom:42,left:0,zIndex:50}}><ColorPicker color={newColor} onChange={setNewColor} onClose={function(){setShowNewColor(false);}}/></div>}</div>
        <button onClick={addTask} style={{flex:1,background:"#E8A838",color:"#0D1117",border:"none",borderRadius:6,padding:"10px 0",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Добавить</button>
      </div>
    </div>
  </div>);

  var taskList=(<div>
    <div style={{fontSize:10,color:"#7D8590",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Режим дня</div>
    <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:mob?9999:400,overflowY:"auto"}}>
      {safeTasks.map(function(t,i){
        var isSel=selected===t.id,isCur=curTask&&curTask.id===t.id,isEd=editingId===t.id;
        return(<div key={t.id} draggable={!isEd}
          onDragStart={function(){dragI.current=i;}} onDragEnter={function(){dragO.current=i;}} onDragEnd={dEnd} onDragOver={function(e){e.preventDefault();}}
          onClick={function(){if(!isEd)setSelected(isSel?null:t.id);}}
          style={{display:"flex",alignItems:"center",gap:6,background:isCur?"#1A2332":isSel?"#1C2333":"#161B22",
            border:"1px solid "+(isCur?t.color+"50":isSel?t.color+"40":"#21262D"),borderRadius:8,padding:"8px",cursor:isEd?"default":"pointer",transition:"all .2s",
            boxShadow:isCur?"inset 3px 0 0 "+t.color:"none"}}>
          <div style={{cursor:"grab",color:"#484F58",fontSize:12,userSelect:"none"}}>≡</div>
          <div style={{width:3,height:24,borderRadius:2,background:t.color,opacity:isSel||isCur?1:0.5,flexShrink:0}}/>
          {isEd?(<div style={{flex:1,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}} onClick={function(e){e.stopPropagation();}}>
            <input value={editData.name} onChange={function(e){setEditData(function(d){return Object.assign({},d,{name:e.target.value});});}}
              onKeyDown={function(e){if(e.key==="Enter")saveEdit(t.id);}} style={Object.assign({},inp,{width:70,flex:"1 1 60px",fontSize:11,padding:"5px 6px"})}/>
            <input type="time" value={editData.start} onChange={function(e){setEditData(function(d){return Object.assign({},d,{start:e.target.value});});}} style={Object.assign({},inp,{width:75,fontSize:11,padding:"5px 6px"})}/>
            <input type="time" value={editData.end} onChange={function(e){setEditData(function(d){return Object.assign({},d,{end:e.target.value});});}} style={Object.assign({},inp,{width:75,fontSize:11,padding:"5px 6px"})}/>
            <div style={{position:"relative"}}>
              <div onClick={function(){setColorPickerId(colorPickerId===t.id?null:t.id);}}
                style={{width:24,height:24,borderRadius:4,background:editData.color,cursor:"pointer",border:"1px solid #30363D"}}/>
              {colorPickerId===t.id&&<div style={{position:"absolute",bottom:30,right:0,zIndex:50}}>
                <ColorPicker color={editData.color} onChange={function(c){setEditData(function(d){return Object.assign({},d,{color:c});});}} onClose={function(){setColorPickerId(null);}}/></div>}
            </div>
            <button onClick={function(){saveEdit(t.id);}} style={{background:"#4ECDC4",color:"#0D1117",border:"none",borderRadius:4,padding:"4px 8px",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓</button>
            <button onClick={function(){setEditingId(null);setColorPickerId(null);}} style={{background:"none",border:"1px solid #30363D",borderRadius:4,color:"#7D8590",padding:"4px 6px",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
          </div>):(<React.Fragment>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                {t.name}
                {isCur&&<span style={{fontSize:7,background:t.color+"30",color:t.color,padding:"1px 4px",borderRadius:3,fontWeight:700,letterSpacing:1}}>СЕЙЧАС</span>}
              </div>
              <div style={{fontSize:10,color:"#7D8590",marginTop:1}}>{pad2(t.startH)}:{pad2(t.startM)} — {pad2(t.endH)}:{pad2(t.endM)}</div>
            </div>
            <div style={{fontSize:11,color:t.color,fontWeight:600}}>{fmtD(tMin(t))}</div>
            <span onClick={function(e){e.stopPropagation();startEdit(t);}} style={{color:"#484F58",fontSize:11,cursor:"pointer",padding:"0 2px"}}>✎</span>
            <span onClick={function(e){e.stopPropagation();rmTask(t.id);}} style={{color:"#484F58",fontSize:13,cursor:"pointer",padding:"0 2px"}}>✕</span>
          </React.Fragment>)}
        </div>);})}
      {safeTasks.length===0&&<div style={{textAlign:"center",color:"#484F58",padding:16,fontSize:11}}>Добавь задачу</div>}
    </div>
  </div>);

  var boards=(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <ChecklistBoard title="Alif Bank · Карты" icon="🏦" accent="#E8A838" storageKey="board_bank"
      defaultItems={[{id:1,text:"Отчёт по картам Visa",done:false},{id:2,text:"Сверка Mastercard",done:false}]} initLevel="Junior" initDeadline={defD}/>
    <ChecklistBoard title="Data Analytics" icon="📊" accent="#4ECDC4" storageKey="board_study"
      defaultItems={[{id:1,text:"SQL задачи",done:false},{id:2,text:"Python pandas",done:false}]} initLevel="Уровень 1" initDeadline={defD}/>
    <ChecklistBoard title="English" icon="🇬🇧" accent="#7C6FE0" storageKey="board_eng"
      defaultItems={[{id:1,text:"Duolingo 15 мин",done:false},{id:2,text:"Читать статью",done:false}]} initLevel="A1" initDeadline={defD}/>
  </div>);

  if(mob){
    return(<div style={{minHeight:"100vh",background:"#0D1117",color:"#E6EDF3",fontFamily:"'JetBrains Mono','Fira Code','SF Mono',monospace",padding:"16px 12px",boxSizing:"border-box"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:9,letterSpacing:2,color:"#7D8590",textTransform:"uppercase",marginBottom:4}}>Планировщик · 24ч {syncIndicator}</div>
          <div style={{display:"flex",gap:14}}>
            <div><div style={{fontSize:16,fontWeight:700,color:"#E8A838"}}>{fmtD(totalUsed)}</div><div style={{fontSize:8,color:"#7D8590"}}>ЗАНЯТО</div></div>
            <div><div style={{fontSize:16,fontWeight:700,color:totalFree>0?"#4ECDC4":"#FF6B6B"}}>{fmtD(totalFree)}</div><div style={{fontSize:8,color:"#7D8590"}}>СВОБОДНО</div></div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:22,fontWeight:700,letterSpacing:2,fontVariantNumeric:"tabular-nums"}}>{timeStr}</div>
          <div style={{fontSize:9,color:"#7D8590"}}>{now.toLocaleDateString("ru-RU",{weekday:"short",day:"numeric",month:"short"})}</div>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:4}}>{clockSVG}</div>
      <PrayerTimes mobile={true}/>
      <div style={{height:12}}/>
      {currentBlock}
      <div style={{marginBottom:12}}>{addForm}</div>
      <div style={{marginBottom:16}}>{taskList}</div>
      {boards}
    </div>);
  }

  return(<div style={{minHeight:"100vh",background:"#0D1117",color:"#E6EDF3",fontFamily:"'JetBrains Mono','Fira Code','SF Mono',monospace",padding:"20px",boxSizing:"border-box"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>
        <div style={{fontSize:10,letterSpacing:3,color:"#7D8590",textTransform:"uppercase",marginBottom:6}}>Планировщик · 24ч {syncIndicator}</div>
        <div style={{display:"flex",gap:20}}>
          <div><div style={{fontSize:20,fontWeight:700,color:"#E8A838"}}>{fmtD(totalUsed)}</div><div style={{fontSize:9,color:"#7D8590",letterSpacing:1}}>ЗАНЯТО</div></div>
          <div><div style={{fontSize:20,fontWeight:700,color:totalFree>0?"#4ECDC4":"#FF6B6B"}}>{fmtD(totalFree)}</div><div style={{fontSize:9,color:"#7D8590",letterSpacing:1}}>СВОБОДНО</div></div>
        </div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:30,fontWeight:700,letterSpacing:2,fontVariantNumeric:"tabular-nums"}}>{timeStr}</div>
        <div style={{fontSize:10,color:"#7D8590",marginTop:2}}>{now.toLocaleDateString("ru-RU",{weekday:"short",day:"numeric",month:"short"})}</div>
      </div>
    </div>
    <div style={{display:"flex",gap:16,marginBottom:16,alignItems:"flex-start"}}>
      <div style={{width:260,flexShrink:0}}>{boards}</div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
        {clockSVG}
        <PrayerTimes mobile={false}/>
      </div>
      <div style={{width:280,flexShrink:0,display:"flex",flexDirection:"column",gap:10}}>
        {addForm}
        {taskList}
      </div>
    </div>
    {currentBlock}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(DayPlanner));
</script>
</body>
</html>
